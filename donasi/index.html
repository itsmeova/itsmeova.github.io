<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YanzGPT Web Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>YanzGPT Query Interface</h1>
    <form id="queryForm">
        <label for="query">Your Query:</label><br>
        <input type="text" id="query" name="query" required><br><br>
        
        <label for="model">Select Model:</label><br>
        <select id="model" name="model" required>
            <option value="yanzgpt-revolution-25b-v3.0">yanzgpt-revolution-25b-v3.0</option>
            <option value="yanzgpt-legacy-72b-v3.0">yanzgpt-legacy-72b-v3.0</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>

    <h2>Response:</h2>
    <pre id="responseOutput"></pre>

    <script>
        document.getElementById('queryForm').addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent the form from submitting the traditional way
            const query = document.getElementById('query').value;
            const model = document.getElementById('model').value;

            try {
                const response = await axios.post("https://yanzgpt.my.id/chat", {
                    query: query,
                    model: model
                }, {
                    headers: {
                        "Content-Type": "application/json"
                    }
                });
                // Display the response in the output area
                document.getElementById('responseOutput').innerText = JSON.stringify(response.data, null, 2);
            } catch (error) {
                // Display error message if the API call fails
                document.getElementById('responseOutput').innerText = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
